<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7b5ea7" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b5ea7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="240" fill="#0a0a0f"/>
  <rect width="800" height="240" fill="url(#grid)"/>
  <ellipse cx="400" cy="120" rx="300" ry="160" fill="url(#glow)"/>
  <!-- Decorative circles -->
  <circle cx="400" cy="120" r="90" fill="none" stroke="#7b5ea7" stroke-width="0.8" opacity="0.2"/>
  <circle cx="400" cy="120" r="60" fill="none" stroke="#7b5ea7" stroke-width="0.5" opacity="0.15"/>
  <circle cx="400" cy="120" r="120" fill="none" stroke="#7b5ea7" stroke-width="0.4" stroke-dasharray="4 8" opacity="0.1"/>
  <!-- Corner accents -->
  <line x1="0" y1="0" x2="60" y2="0" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="0" x2="0" y2="40" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4"/>
  <line x1="800" y1="0" x2="740" y2="0" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4"/>
  <line x1="800" y1="0" x2="800" y2="40" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="240" x2="60" y2="240" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="240" x2="0" y2="200" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4"/>
  <line x1="800" y1="240" x2="740" y2="240" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4"/>
  <line x1="800" y1="240" x2="800" y2="200" stroke="#7b5ea7" stroke-width="1.5" opacity="0.4"/>
  <!-- Main text -->
  <text x="400" y="108" text-anchor="middle" font-family="monospace" font-size="32" font-weight="900" fill="#7b5ea7" letter-spacing="8">URL</text>
  <text x="400" y="142" text-anchor="middle" font-family="monospace" font-size="13" fill="#888" letter-spacing="4">Uniform Resource Locator</text>
  <!-- Bottom border -->
  <rect x="160" y="162" width="480" height="1" fill="#7b5ea7" opacity="0.2"/>
</svg>